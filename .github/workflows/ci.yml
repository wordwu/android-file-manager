name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Environment
        run: |
          swift --version
          xcodebuild -version
          xcrun --show-sdk-path
          sw_vers

      - name: Build
        run: swift build 2>&1 | tee build.log

      - name: Build log
        if: failure()
        run: cat build.log

      - name: Test
        run: swift test 2>&1 | tee test.log

      - name: Test log
        if: failure()
        run: cat test.log
